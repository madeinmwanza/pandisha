<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pandisha</title>
<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white}
.container{max-width:400px;margin:80px auto}
.card{background:#111827;padding:25px;border-radius:12px}
input,select{width:100%;padding:12px;margin-bottom:12px;border:none;border-radius:8px}
button{width:100%;padding:12px;background:#7B2FF7;color:white;border:none;border-radius:8px}
.switch{text-align:center;margin-top:10px;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<div id="loginCard" class="card">
<h2>Login</h2>
<input id="login-username" placeholder="Username">
<input id="login-password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div class="switch" onclick="showSignup()">Create account</div>
</div>

<div id="signupCard" class="card" style="display:none;">
<h2>Sign Up</h2>
<input id="signup-username" placeholder="Username">
<input id="signup-email" placeholder="Email">
<input id="signup-password" type="password" placeholder="Password">
<input id="signup-confirm-password" type="password" placeholder="Confirm Password">
<select id="signup-security-question">
<option value="">Security Question</option>
<option>Mother name?</option>
<option>First school?</option>
</select>
<input id="signup-security-answer" placeholder="Answer">
<button onclick="signUp()">Create Account</button>
<div class="switch" onclick="showLogin()">Already have account?</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { getFirestore, collection, addDoc, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyB7z...",
authDomain:"pandisha1.firebaseapp.com",
projectId:"pandisha1"
});

const auth = getAuth(app);
const db = getFirestore(app);

window.showSignup=()=>{loginCard.style.display="none";signupCard.style.display="block"}
window.showLogin=()=>{loginCard.style.display="block";signupCard.style.display="none"}

window.signUp=async()=>{
const username=signup_username.value.trim();
const email=signup_email.value.trim();
const password=signup_password.value.trim();

const q=query(collection(db,"users"),where("username","==",username));
const snap=await getDocs(q);
if(!snap.empty){alert("Username imetumika");return;}

if(snap.empty){alert("Username haipo");return;}

await signInWithEmailAndPassword(auth,email,password);

</script>

</body>
</html>
