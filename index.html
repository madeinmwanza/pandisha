<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pandisha</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.container {
  max-width:400px;
  margin:80px auto;
}

.card {
  background:#111827;
  padding:25px;
  border-radius:12px;
}

input, select {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:8px;
}

button {
  width:100%;
  padding:12px;
  background:#7B2FF7;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.switch {
  margin-top:10px;
  text-align:center;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div id="loginCard" class="card">
<h2>Login</h2>

<input id="login-username" placeholder="Username">
<input id="login-password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="switch" onclick="showSignup()">Create account</div>
</div>


<div id="signupCard" class="card" style="display:none;">
<h2>Sign Up</h2>

<input id="signup-username" placeholder="Username">
<input id="signup-email" placeholder="Email">
<input id="signup-password" type="password" placeholder="Password">
<input id="signup-confirm-password" type="password" placeholder="Confirm Password">

<select id="signup-security-question">
<option value="">Security Question</option>
<option>Mother name?</option>
<option>First school?</option>
<option>Favorite artist?</option>
</select>

<input id="signup-security-answer" placeholder="Answer">

<button onclick="signUp()">Create Account</button>

<div class="switch" onclick="showLogin()">Already have account?</div>
</div>

</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { getFirestore, collection, addDoc, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7zfgQ3GqdPL2o1tyFt2RmW3Obqb1nKPk",
  authDomain: "pandisha1.firebaseapp.com",
  projectId: "pandisha1",
  storageBucket: "pandisha1.firebasestorage.app",
  messagingSenderId: "914457078679",
  appId: "1:914457078679:web:f11bf8ccc4fd824459f2d2",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


// SWITCH
window.showSignup = () => {
  document.getElementById("loginCard").style.display = "none";
  document.getElementById("signupCard").style.display = "block";
};

window.showLogin = () => {
  document.getElementById("loginCard").style.display = "block";
  document.getElementById("signupCard").style.display = "none";
};


// SIGNUP
window.signUp = async function() {
  const username = document.getElementById("signup-username").value.trim();
  const email = document.getElementById("signup-email").value.trim();
  const password = document.getElementById("signup-password").value.trim();
  const confirmPassword = document.getElementById("signup-confirm-password").value.trim();
  const securityQuestion = document.getElementById("signup-security-question").value;
  const securityAnswer = document.getElementById("signup-security-answer").value.trim();

  if (!username || !email || !password || !confirmPassword || !securityQuestion || !securityAnswer) {
    alert("Jaza taarifa zote");
    return;
  }

  if (password !== confirmPassword) {
    alert("Password hazifanani");
    return;
  }

  const check = query(collection(db,"users"), where("username","==",username));
  const snap = await getDocs(check);

  if (!snap.empty) {
    alert("Username imetumika");
    return;
  }

  const userCredential = await createUserWithEmailAndPassword(auth,email,password);

  await addDoc(collection(db,"users"), {
    userId: userCredential.user.uid,
    username,
    email,
    artistName:"",
    artistNameChanges:0,
    plan:"Starter",
    role:"artist",
    isDisabled:false,
    securityQuestion,
    securityAnswer
  });

  alert("Account created");
  window.location.href="dashboard.html";
};


// LOGIN
window.login = async function() {
  const username = document.getElementById("login-username").value.trim();
  const password = document.getElementById("login-password").value.trim();

  const q = query(collection(db,"users"), where("username","==",username));
  const snap = await getDocs(q);

  if (snap.empty) {
    alert("Username haipo");
    return;
  }

  const email = snap.docs[0].data().email;

  await signInWithEmailAndPassword(auth,email,password);

  window.location.href="dashboard.html";
};

</script>

</body>
</html>
