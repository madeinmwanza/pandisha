<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Pandisha</title>
<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  width:300px;
}
input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
}
button {
  width:100%;
  padding:12px;
  background:linear-gradient(90deg,#7B2FF7,#FF7A18);
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "pandisha1.firebaseapp.com",
  projectId: "pandisha1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.login = async function(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const q = query(collection(db,"users"), where("username","==",username));
  const snap = await getDocs(q);

  if(snap.empty){
    alert("Username haipo");
    return;
  }

  const email = snap.docs[0].data().email;

  await signInWithEmailAndPassword(auth,email,password);
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
