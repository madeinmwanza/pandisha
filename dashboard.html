<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{background:#0b0f1a;color:white;font-family:Arial}
.container{padding:30px}
</style>
</head>

<body>

<div class="container">
<h2 id="user"></h2>
<button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { getFirestore, collection, query, where, getDocs }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyB7z...",authDomain:"pandisha1.firebaseapp.com",projectId:"pandisha1"});
const auth=getAuth(app);
const db=getFirestore(app);

onAuthStateChanged(auth,async(user)=>{
if(!user){location.href="index.html";return;}

const q=query(collection(db,"users"),where("userId","==",user.uid));
const snap=await getDocs(q);

const data=snap.docs[0].data();

if(data.isDisabled){
alert("Account imezuiwa");
await signOut(auth);
location.href="index.html";
return;
}

document.getElementById("user").innerText="Welcome "+data.username;
});

window.logout=async()=>{
await signOut(auth);
location.href="index.html";
};
</script>

</body>
</html>
