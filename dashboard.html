<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pandisha Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    .container {
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .btn-primary {
      background: #7B2FF7;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="topbar">
    <h2>Artist Dashboard</h2>
    <button class="btn btn-primary" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Account</h3>
    <p id="user-email">Loading...</p>
  </div>

  <div class="card">
    <h3>Upload Song</h3>

    <input type="text" placeholder="Song Title">
    <input type="text" placeholder="Artist Name">
    <input type="date">

    <input type="file" accept=".mp3,.wav">
    <input type="file" accept="image/*">

    <button class="btn btn-primary">Submit</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7zfgQ3GqdPL2o1tyFt2RmW3Obqb1nKPk",
  authDomain: "pandisha1.firebaseapp.com",
  projectId: "pandisha1",
  storageBucket: "pandisha1.firebasestorage.app",
  messagingSenderId: "914457078679",
  appId: "1:914457078679:web:f11bf8ccc4fd824459f2d2",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("user-email").textContent = user.email;
  } else {
    window.location.href = "index.html";
  }
});

window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
};
</script>

</body>
</html>
