<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<style>
body{background:#0b0f1a;color:white;font-family:Arial}
.container{padding:30px}
.card{background:#111827;padding:15px;margin-bottom:10px}
button{margin:5px;padding:8px}
</style>
</head>

<body>

<div class="container">
<h2>Admin Panel</h2>
<div id="users"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth,onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import { getFirestore,collection,getDocs,doc,updateDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyB7z...",authDomain:"pandisha1.firebaseapp.com",projectId:"pandisha1"});
const auth=getAuth(app);
const db=getFirestore(app);

const ADMIN_EMAIL="madeinmwanza@gmail.com";

onAuthStateChanged(auth,async(user)=>{
if(!user||user.email!==ADMIN_EMAIL){
document.body.innerHTML="ACCESS DENIED";
return;
}
loadUsers();
});

async function loadUsers(){
const snap=await getDocs(collection(db,"users"));
let html="";

snap.forEach(docu=>{
const u=docu.data();

html+=`
<div class="card">
<b>${u.username}</b><br>
${u.email}<br>
Plan: ${u.plan}<br>
Status: ${u.isDisabled?"Disabled":"Active"}<br>

<button onclick="disable('${docu.id}')">Disable</button>
<button onclick="enable('${docu.id}')">Enable</button>
<button onclick="makeAdmin('${docu.id}')">Make Admin</button>
<button onclick="reset('${docu.id}')">Reset Name Limit</button>
</div>
`;
});

document.getElementById("users").innerHTML=html;
}

window.disable=async(id)=>{
await updateDoc(doc(db,"users",id),{isDisabled:true});
loadUsers();
};

window.enable=async(id)=>{
await updateDoc(doc(db,"users",id),{isDisabled:false});
loadUsers();
};

window.makeAdmin=async(id)=>{
await updateDoc(doc(db,"users",id),{role:"admin"});
loadUsers();
};

window.reset=async(id)=>{
await updateDoc(doc(db,"users",id),{artistNameChanges:0});
loadUsers();
};
</script>

</body>
</html>
