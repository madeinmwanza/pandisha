<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandisha Admin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin: 8px 0 0;
      color: rgba(255,255,255,0.65);
      font-size: 14px;
    }

    .controls {
      padding: 16px 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      padding: 11px 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      min-width: 260px;
    }

    button {
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      border: none;
      outline: none;
      border-radius: 10px;
      padding: 12px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      resize: vertical;
      margin-top: 12px;
    }

    .filter-btn {
      background: #1f2937;
      color: white;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      margin-left: auto;
    }

    .container {
      padding: 20px;
    }

    .release {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 15px;
      display: flex;
      gap: 15px;
      align-items: flex-start;
    }

    .cover img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }

    .info {
      flex: 1;
    }

    .info h3 {
      margin: 0 0 8px;
      font-size: 21px;
    }

    .info p {
      margin: 0 0 6px;
      color: rgba(255,255,255,0.72);
      line-height: 1.6;
    }

    .status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin: 6px 0 10px;
    }

    .pending { background: rgba(245, 158, 11, 0.18); color: #ffd27a; }
    .approved { background: rgba(34, 197, 94, 0.18); color: #a7f3c0; }
    .rejected { background: rgba(239, 68, 68, 0.18); color: #fecaca; }
    .live { background: rgba(123, 47, 247, 0.22); color: #d8c4ff; }
    .needs { background: rgba(245, 158, 11, 0.22); color: #fcd34d; }
    .scheduled { background: rgba(59, 130, 246, 0.22); color: #bfdbfe; }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .approve-btn {
      background: #22c55e;
      color: white;
    }

    .reject-btn {
      background: #ef4444;
      color: white;
    }

    .live-btn {
      background: #7B2FF7;
      color: white;
    }

    .fix-btn {
      background: #f59e0b;
      color: white;
    }

    .save-reason-btn {
      background: #2563eb;
      color: white;
      margin-top: 10px;
    }

    .schedule-btn {
      background: #3b82f6;
      color: white;
      margin-top: 10px;
    }

    .schedule-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .schedule-row input[type="date"] {
      min-width: 180px;
    }

    audio {
      margin-top: 10px;
      width: 260px;
      max-width: 100%;
    }

    .center-box {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .message-card {
      width: min(520px, 100%);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      text-align: center;
    }

    .message-card h2 {
      margin-top: 0;
      font-size: 30px;
    }

    .message-card p {
      color: rgba(255,255,255,0.72);
      line-height: 1.8;
    }

    .hidden {
      display: none !important;
    }

    .small-note {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      margin-top: 8px;
    }

    .reason-box {
      margin-top: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
    }

    .reason-label {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .reason-text {
      color: rgba(255,255,255,0.85);
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
    }

    @media (max-width: 700px) {
      .release {
        flex-direction: column;
      }

      .logout-btn {
        margin-left: 0;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      input {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="loadingScreen" class="center-box">
    <div class="message-card">
      <h2>Checking access...</h2>
      <p>Please wait while we verify your admin account.</p>
    </div>
  </div>

  <div id="deniedScreen" class="center-box hidden">
    <div class="message-card">
      <h2>Access denied</h2>
      <p>This page is only for Pandisha admins.</p>
      <p class="small-note">Log in with your admin account to continue.</p>
      <button onclick="goHome()">Go to Home</button>
    </div>
  </div>

  <div id="adminApp" class="hidden">
    <div class="header">
      <h1>Pandisha Admin Panel</h1>
      <p id="adminEmail">Loading admin...</p>
    </div>

    <div class="controls">
      <input id="search" placeholder="Search artist or song..." oninput="renderReleases()" />
      <button class="filter-btn" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('Pending Review')">Pending</button>
      <button class="filter-btn" onclick="setFilter('Needs Correction')">Needs Fix</button>
      <button class="filter-btn" onclick="setFilter('Approved')">Approved</button>
      <button class="filter-btn" onclick="setFilter('Scheduled')">Scheduled</button>
      <button class="filter-btn" onclick="setFilter('Live')">Live</button>
      <button class="filter-btn" onclick="setFilter('Rejected')">Rejected</button>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <div class="container" id="list"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB7zfgQ3GqdPL2o1tyFt2RmW3Obqb1nKPk",
      authDomain: "pandisha1.firebaseapp.com",
      projectId: "pandisha1",
      storageBucket: "pandisha1.firebasestorage.app",
      messagingSenderId: "914457078679",
      appId: "1:914457078679:web:f11bf8ccc4fd824459f2d2",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAILS = [
      "WEKA_EMAIL_YAKO_HALISI_HAPA"
    ];

    let filter = "all";
    let allReleases = [];

    const loadingScreen = document.getElementById("loadingScreen");
    const deniedScreen = document.getElementById("deniedScreen");
    const adminApp = document.getElementById("adminApp");
    const adminEmailText = document.getElementById("adminEmail");

    function normalizeEmail(email) {
      return (email || "").trim().toLowerCase();
    }

    function isAdminEmail(email) {
      return ADMIN_EMAILS.map(normalizeEmail).includes(normalizeEmail(email));
    }

    function todayString() {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    async function autoPublishScheduledReleases() {
      const snap = await getDocs(collection(db, "releases"));
      const today = todayString();

      const updates = [];
      snap.forEach((docSnap) => {
        const data = docSnap.data();
        if (data.status === "Scheduled" && data.scheduledReleaseDate && data.scheduledReleaseDate <= today) {
          updates.push(
            updateDoc(doc(db, "releases", docSnap.id), {
              status: "Live"
            })
          );
        }
      });

      if (updates.length) {
        await Promise.all(updates);
      }
    }

    function showLoading() {
      loadingScreen.classList.remove("hidden");
      deniedScreen.classList.add("hidden");
      adminApp.classList.add("hidden");
    }

    function showDenied() {
      loadingScreen.classList.add("hidden");
      deniedScreen.classList.remove("hidden");
      adminApp.classList.add("hidden");
    }

    function showAdmin() {
      loadingScreen.classList.add("hidden");
      deniedScreen.classList.add("hidden");
      adminApp.classList.remove("hidden");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML;
    }

    function statusClass(statusText) {
      const s = (statusText || "").toLowerCase();
      if (s.includes("approved")) return "approved";
      if (s.includes("rejected")) return "rejected";
      if (s.includes("scheduled")) return "scheduled";
      if (s.includes("live")) return "live";
      if (s.includes("correction")) return "needs";
      return "pending";
    }

    window.setFilter = function(status) {
      filter = status;
      renderReleases();
    };

    function renderReleases() {
      const list = document.getElementById("list");
      const search = document.getElementById("search").value.trim().toLowerCase();

      const filtered = allReleases.filter(item => {
        const d = item.data;
        const title = (d.title || "").toLowerCase();
        const artist = (d.artist || "").toLowerCase();
        const status = d.status || "";

        const matchesSearch = title.includes(search) || artist.includes(search);
        const matchesFilter = filter === "all" || status === filter;
        return matchesSearch && matchesFilter;
      });

      if (!filtered.length) {
        list.innerHTML = `
          <div class="message-card" style="margin: 0 auto;">
            <h2 style="font-size:24px;">No releases found</h2>
            <p>Try another search or filter.</p>
          </div>
        `;
        return;
      }

      list.innerHTML = filtered.map(item => {
        const id = item.id;
        const d = item.data;
        const currentReason = d.reviewReason || "";
        const scheduledDate = d.scheduledReleaseDate || "";

        return `
          <div class="release">
            <div class="cover">
              <img src="${d.coverUrl || ""}" alt="Cover">
            </div>

            <div class="info">
              <h3>${escapeHtml(d.title || "-")}</h3>
              <p>Artist: ${escapeHtml(d.artist || "-")}</p>
              <p>Genre: ${escapeHtml(d.genre || "-")}</p>
              <p>Release Date: ${escapeHtml(d.releaseDate || "-")}</p>
              ${scheduledDate ? `<p>Scheduled Live Date: ${escapeHtml(scheduledDate)}</p>` : ""}
              <span class="status ${statusClass(d.status)}">${escapeHtml(d.status || "Pending Review")}</span>

              ${d.audioUrl ? `<audio controls src="${d.audioUrl}"></audio>` : ""}

              ${
                currentReason
                  ? `
                    <div class="reason-box">
                      <div class="reason-label">Current reason</div>
                      <div class="reason-text">${escapeHtml(currentReason)}</div>
                    </div>
                  `
                  : ""
              }

              <div class="reason-box">
                <div class="reason-label">Write reason for artist</div>
                <textarea id="reason-${id}" placeholder="Example: Cover artwork ina blurry, rekebisha title spelling, au tuma audio clean version...">${escapeHtml(currentReason)}</textarea>
                <button class="save-reason-btn" onclick="saveReasonOnly('${id}')">Save Reason Only</button>

                <div class="schedule-row">
                  <input id="schedule-${id}" type="date" value="${escapeHtml(scheduledDate)}" />
                  <button class="schedule-btn" onclick="scheduleRelease('${id}')">Schedule</button>
                </div>
              </div>

              <div class="buttons">
                <button class="approve-btn" onclick="setStatusWithReason('${id}','Approved')">Approve</button>
                <button class="fix-btn" onclick="setStatusWithReason('${id}','Needs Correction')">Needs Fix</button>
                <button class="live-btn" onclick="setStatusWithReason('${id}','Live')">Make Live</button>
                <button class="reject-btn" onclick="setStatusWithReason('${id}','Rejected')">Reject</button>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    async function fetchReleases() {
      const snap = await getDocs(collection(db, "releases"));

      allReleases = snap.docs.map(docSnap => ({
        id: docSnap.id,
        data: docSnap.data()
      }));

      allReleases.sort((a, b) => {
        const aTime = a.data?.createdAt?.seconds || a.data?.updatedAt?.seconds || 0;
        const bTime = b.data?.createdAt?.seconds || b.data?.updatedAt?.seconds || 0;
        return bTime - aTime;
      });

      renderReleases();
    }

    window.saveReasonOnly = async function(id) {
      const reason = document.getElementById(`reason-${id}`)?.value?.trim() || "";
      await updateDoc(doc(db, "releases", id), {
        reviewReason: reason
      });
      await fetchReleases();
    };

    window.scheduleRelease = async function(id) {
      const reason = document.getElementById(`reason-${id}`)?.value?.trim() || "";
      const scheduleDate = document.getElementById(`schedule-${id}`)?.value || "";

      if (!scheduleDate) {
        alert("Choose schedule date first.");
        return;
      }

      await updateDoc(doc(db, "releases", id), {
        status: "Scheduled",
        scheduledReleaseDate: scheduleDate,
        reviewReason: reason
      });

      await fetchReleases();
    };

    window.setStatusWithReason = async function(id, status) {
      const reason = document.getElementById(`reason-${id}`)?.value?.trim() || "";

      const payload = {
        status
      };

      if (status === "Approved" || status === "Live") {
        payload.reviewReason = "";
      } else {
        payload.reviewReason = reason;
      }

      if (status === "Live") {
        payload.scheduledReleaseDate = "";
      }

      await updateDoc(doc(db, "releases", id), payload);
      await fetchReleases();
    };

    window.logout = async function() {
      await signOut(auth);
      window.location.href = "index.html";
    };

    window.goHome = function() {
      window.location.href = "index.html";
    };

    onAuthStateChanged(auth, async (user) => {
      showLoading();

      if (!user) {
        window.location.href = "index.html";
        return;
      }

      if (!isAdminEmail(user.email)) {
        showDenied();
        return;
      }

      adminEmailText.textContent = `Logged in as: ${user.email}`;
      showAdmin();
      await autoPublishScheduledReleases();
      await fetchReleases();
    });
  </script>
</body>
</html>
