<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pandisha Admin</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

.header {
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.controls {
  padding:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.filter-btn {
  background:#1f2937;
  color:white;
}

.container {
  padding:20px;
}

.release {
  background: rgba(255,255,255,0.05);
  border-radius:16px;
  padding:16px;
  margin-bottom:15px;
  display:flex;
  gap:15px;
}

.cover img {
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.status {
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}

.pending { background:#f59e0b; }
.approved { background:#22c55e; }
.rejected { background:#ef4444; }
.live { background:#7B2FF7; }

.buttons button {
  margin-right:6px;
}
</style>
</head>

<body>

<div class="header">
  <h1>Pandisha Admin Panel</h1>
</div>

<div class="controls">
  <input id="search" placeholder="Search artist or song..." oninput="load()">

  <button class="filter-btn" onclick="setFilter('all')">All</button>
  <button class="filter-btn" onclick="setFilter('Pending Review')">Pending</button>
  <button class="filter-btn" onclick="setFilter('Approved')">Approved</button>
  <button class="filter-btn" onclick="setFilter('Live')">Live</button>
  <button class="filter-btn" onclick="setFilter('Rejected')">Rejected</button>
</div>

<div class="container" id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB7zfgQ3GqdPL2o1tyFt2RmW3Obqb1nKPk",
  authDomain: "pandisha1.firebaseapp.com",
  projectId: "pandisha1",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let filter = "all";

window.setFilter = function(f) {
  filter = f;
  load();
};

async function load() {
  const list = document.getElementById("list");
  const search = document.getElementById("search").value.toLowerCase();

  const snap = await getDocs(collection(db, "releases"));

  list.innerHTML = "";

  snap.forEach(docSnap => {
    const d = docSnap.data();

    if (filter !== "all" && d.status !== filter) return;

    if (
      d.title.toLowerCase().includes(search) ||
      d.artist.toLowerCase().includes(search)
    ) {
      list.innerHTML += `
      <div class="release">
        <div class="cover">
          <img src="${d.coverUrl}">
        </div>

        <div>
          <h3>${d.title}</h3>
          <p>${d.artist}</p>
          <span class="status ${d.status.toLowerCase()}">${d.status}</span>

          <audio controls src="${d.audioUrl}"></audio>

          <div class="buttons">
            <button onclick="setStatus('${docSnap.id}','Approved')">Approve</button>
            <button onclick="setStatus('${docSnap.id}','Rejected')">Reject</button>
            <button onclick="setStatus('${docSnap.id}','Live')">Live</button>
          </div>
        </div>
      </div>
      `;
    }
  });
}

window.setStatus = async function(id, status) {
  await updateDoc(doc(db, "releases", id), { status });
  load();
};

load();
</script>

</body>
</html>
